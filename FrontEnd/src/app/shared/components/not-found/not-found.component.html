<div class="min-h-screen bg-surface flex flex-col items-center justify-center p-4">
  <div class="text-center max-w-lg">

    <!-- Big Icon/Graphic -->
    <div class="relative inline-block mb-8">
      <div class="w-32 h-32 bg-primary-container rounded-full flex items-center justify-center animate-pulse-slow">
        <span class="material-symbols-outlined text-on-primary-container text-[80px]"
          style="font-variation-settings: 'FILL' 1;">eco</span>
      </div>
      <!-- Subtle Decorative badge -->
      <div
        class="absolute -top-2 -right-4 bg-error text-on-error font-headline font-bold text-2xl px-3 py-1 rounded-xl shadow-lg rotate-12">

      </div>
    </div>

    <!-- Text Content -->
    <h1 class="text-4xl font-headline font-extrabold text-on-surface tracking-tight mb-4">

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">

        <span class="material-symbols-outlined text-outline">arrow_back</span>
        Go Back
      </button>

      <a routerLink="/org/overview"
        class="w-full sm:w-auto px-6 py-3 bg-primary text-on-primary rounded-xl font-label font-semibold hover:bg-primary-container hover:text-on-primary-container transition-all shadow-md shadow-primary/20 flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">home</span>

      </a>
    </div>

  </div>
