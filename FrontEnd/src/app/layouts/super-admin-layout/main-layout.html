<div class="app-layout">
  <aside class="app-sidebar">
    <div class="sidebar-brand">
      <span class="brand-title">Root2Route</span>
      <p class="brand-subtitle">Super Admin</p>
    </div>

    <nav class="sidebar-nav">
      <a class="nav-item" routerLink="/super-admin/dashboard" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/organizations" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="corporate_fare">corporate_fare</span>
        <span class="nav-label">Organizations</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/auctions" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="gavel">gavel</span>
        <span class="nav-label">Auctions</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/products" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
        <span class="nav-label">Products</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/ai-lab" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="science">science</span>
        <span class="nav-label">AI Models</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/reports" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="description">description</span>
        <span class="nav-label">Reports</span>
      </a>
      <a class="nav-item" routerLink="/super-admin/settings" routerLinkActive="active">
        <span class="material-symbols-outlined" data-icon="settings">settings</span>
        <span class="nav-label">Settings</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <img alt="User" src="https://ui-avatars.com/api/?name=Admin&background=006c49&color=fff" />
        <span class="user-name">Admin User</span>
      </div>
      <button (click)="logout()" class="logout-btn" title="Logout">
        <span class="material-symbols-outlined" data-icon="logout">logout</span>
      </button>
    </div>
  </aside>

  <main class="app-main">
    <header class="app-header">
      <div class="search-bar">
        <span class="material-symbols-outlined">search</span>
        <input placeholder="Search global registry..." type="text" />
      </div>
      <div class="header-actions">
        <!-- Optional icons like notifications can go here -->
      </div>
    </header>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
