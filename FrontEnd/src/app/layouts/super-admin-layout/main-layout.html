<div class="text-on-background flex bg-surface min-h-screen">

  <aside class="fixed left-0 top-0 h-full flex flex-col p-6 z-40 w-72 border-r-0 bg-emerald-50/50 backdrop-blur-xl">
    <div class="mb-10">
      <span class="text-2xl font-bold text-emerald-800 tracking-tighter">Root2Route</span>
      <p class="text-xs font-manrope font-semibold tracking-tight uppercase text-emerald-700/50 mt-1">Super Admin</p>
    </div>

    <nav class="flex flex-col gap-2 flex-grow">

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/dashboard" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
        <span class="text-sm font-medium">Dashboard</span>
      </a>

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/organizations" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="corporate_fare">corporate_fare</span>
        <span class="text-sm font-medium">Organizations</span>
      </a>

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/auctions" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="gavel">gavel</span>
        <span class="text-sm font-medium">Auctions</span>
      </a>

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/ai-lab" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="science">science</span>
        <span class="text-sm font-medium">AI Models</span>
      </a>

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/reports" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="description">description</span>
        <span class="text-sm font-medium">Reports</span>
      </a>

      <a class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 text-slate-600 hover:text-emerald-600 hover:bg-slate-200/50"
        routerLink="/settings" routerLinkActive="!bg-white !text-emerald-700 shadow-sm font-bold">
        <span class="material-symbols-outlined" data-icon="settings">settings</span>
        <span class="text-sm font-medium">Settings</span>
      </a>

    </nav>

    <div class="mt-auto pt-6 border-t border-emerald-100/30 flex items-center gap-3">
      <img alt="User" class="w-10 h-10 rounded-full bg-emerald-100"
        src="https://ui-avatars.com/api/?name=Admin&background=10b981&color=fff" />
      <div>
        <p class="text-sm font-bold text-on-surface">Admin User</p>
      </div>
      <button (click)="logout()" class="ml-auto text-red-500 hover:bg-red-50 p-2 rounded-lg transition-all"
        title="Logout">
        <span class="material-symbols-outlined" data-icon="logout">logout</span>
      </button>
    </div>
  </aside>

  <main class="ml-72 flex-grow min-h-screen relative">
    <header class="sticky top-0 right-0 flex items-center justify-between px-10 py-4 z-30 bg-white/80 backdrop-blur-md">
      <div class="flex items-center gap-4 bg-surface-container-low px-4 py-2 rounded-full w-96">
        <span class="material-symbols-outlined text-slate-400">search</span>
        <input class="bg-transparent border-none focus:ring-0 text-sm w-full placeholder:text-slate-400"
          placeholder="Search..." type="text" />
      </div>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>
